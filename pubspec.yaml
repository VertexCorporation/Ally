name: ally
description: "Your health's closest ally."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 0.4.2+42

environment:
  sdk: ^3.8.1

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- CORE FLUTTER & UI ---
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.15
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_math_fork: ^0.7.4
  font_awesome_flutter: ^10.8.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  collection: ^1.18.0

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase & Google Services (Updated)
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.0.2
  firebase_analytics: ^12.0.2
  firebase_remote_config: ^6.0.2
  cloud_functions: ^6.0.2
  firebase_crashlytics: ^5.0.2
  firebase_messaging: ^16.0.2

  # --- SECURITY & MISC ---
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  encrypt: ^5.0.3
  email_validator: ^3.0.0
  safe_text: ^1.0.7
  visibility_detector: ^0.4.0+2

  # --- NATIVE INTEGRATIONS ---
  flutter_native_splash: ^2.4.4
  webview_flutter: ^4.13.0
  flutter_local_notifications: ^19.4.2
  play_install_referrer: ^0.5.0
  battery_plus: ^7.0.0

  # --- CONFETTI ---
  confetti: ^0.8.0

  # --- TIMEZONE ---
  timezone: ^0.10.1

  # Other Dependencies
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  flutter_foreground_task: ^8.11.0
  internet_connection_checker_plus: ^2.9.1
  path: ^1.9.1
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/audio/